name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Build Strapi
    runs-on: ubuntu-latest
    env:
      APP_KEYS: ci-placeholder-key-one,ci-placeholder-key-two
      API_TOKEN_SALT: ci-api-token-salt
      ADMIN_JWT_SECRET: ci-admin-jwt-secret
      TRANSFER_TOKEN_SALT: ci-transfer-token-salt
      JWT_SECRET: ci-jwt-secret
      ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      DATABASE_CLIENT: sqlite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin & server
        run: npm run build

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: lenga-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
