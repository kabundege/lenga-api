name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Build Strapi
    runs-on: ubuntu-latest
    env:
      APP_KEYS: ci-placeholder-key-one,ci-placeholder-key-two
      API_TOKEN_SALT: ci-api-token-salt
      ADMIN_JWT_SECRET: ci-admin-jwt-secret
      TRANSFER_TOKEN_SALT: ci-transfer-token-salt
      JWT_SECRET: ci-jwt-secret
      ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      DATABASE_CLIENT: sqlite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin & server
        run: npm run build

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build
    outputs:
      pushed: ${{ steps.image.outputs.push }}
      image_name: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name and push flag
        id: image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ] && [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_PASSWORD" ]; then
            echo "name=${DOCKERHUB_USERNAME}/lenga-api" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "name=lenga-api" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.image.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.image.outputs.push == 'true' }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on server
    runs-on: ubuntu-latest
    needs: docker
    if: needs.docker.outputs.pushed == 'true'
    steps:
      - name: SSH - docker login, replace container
        uses: appleboy/ssh-action@v1.2.5
        env:
          IMAGE_TAG: ${{ secrets.IMAGE_TAG }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
          CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          DEPLOY_DOCKER_RUN_EXTRA_ARGS: ${{ vars.DEPLOY_DOCKER_RUN_EXTRA_ARGS }}
          BACKUP_ROOT: ${{ vars.BACKUP_ROOT || '~/lenga-backups' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_PASSWORD,IMAGE_NAME,IMAGE_TAG,CONTAINER_NAME,DEPLOY_DOCKER_RUN_EXTRA_ARGS,BACKUP_ROOT
          script: |
            set -euo pipefail
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker pull "${IMAGE_NAME}:${IMAGE_TAG}"

            # Remember the currently running image so we can keep it for rollback
            PREV_IMAGE=$(docker inspect --format='{{.Config.Image}}' "$CONTAINER_NAME" 2>/dev/null || true)

            BACKUP_DIR=""
            if docker ps -a --format '{{.Names}}' | grep -qx "$CONTAINER_NAME"; then
              BACKUP_ROOT="${BACKUP_ROOT:-$HOME/lenga-backups}"
              TS=$(date +%Y%m%d-%H%M%S)
              BACKUP_DIR="$BACKUP_ROOT/$TS"
              mkdir -p "$BACKUP_DIR"

              docker run --rm \
                -v lenga-data:/data:ro \
                -v "$BACKUP_DIR":/backup \
                alpine cp /data/data.db /backup/data.db

              docker exec "$CONTAINER_NAME" tar czf /tmp/uploads.tar.gz -C /app/public uploads
              docker cp "$CONTAINER_NAME:/tmp/uploads.tar.gz" "$BACKUP_DIR/uploads.tar.gz"
              docker exec "$CONTAINER_NAME" rm -f /tmp/uploads.tar.gz

              test -s "$BACKUP_DIR/data.db"
              test -s "$BACKUP_DIR/uploads.tar.gz"
              echo "Backup: $BACKUP_DIR"
            else
              echo "No existing container; skipping pre-deploy backup"
            fi

            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true
            docker run -d --name "$CONTAINER_NAME" -p 1337:1337 --restart unless-stopped \
              -v lenga-data:/app/.tmp \
              ${DEPLOY_DOCKER_RUN_EXTRA_ARGS:-} "${IMAGE_NAME}:${IMAGE_TAG}"

            if [ -n "$BACKUP_DIR" ] && [ -f "$BACKUP_DIR/uploads.tar.gz" ]; then
              docker cp "$BACKUP_DIR/uploads.tar.gz" "$CONTAINER_NAME:/tmp/uploads.tar.gz"
              docker exec "$CONTAINER_NAME" sh -c 'mkdir -p /app/public && tar xzf /tmp/uploads.tar.gz -C /app/public'
              docker exec "$CONTAINER_NAME" rm -f /tmp/uploads.tar.gz

              docker exec "$CONTAINER_NAME" test -d /app/public/uploads
              docker exec "$CONTAINER_NAME" sh -c 'test "$(ls -A /app/public/uploads 2>/dev/null | wc -l)" -gt 0'

              if ! docker run --rm -v lenga-data:/data:ro alpine test -s /data/data.db; then
                docker run --rm \
                  -v lenga-data:/data \
                  -v "$BACKUP_DIR":/backup:ro \
                  alpine cp /backup/data.db /data/data.db
                docker restart "$CONTAINER_NAME"
              fi

              docker exec "$CONTAINER_NAME" ls -la /app/.tmp/data.db
              docker exec "$CONTAINER_NAME" ls /app/public/uploads | head -5
              echo "Deploy complete; backup at $BACKUP_DIR"
            fi

            # Clean up old images for this repo, keeping only the newly deployed
            # image and the previous one (for rollback)
            KEEP_IMAGES="${IMAGE_NAME}:${IMAGE_TAG}"
            if [ -n "$PREV_IMAGE" ] && [ "$PREV_IMAGE" != "${IMAGE_NAME}:${IMAGE_TAG}" ]; then
              KEEP_IMAGES="$KEEP_IMAGES|$PREV_IMAGE"
            fi
            docker images "${IMAGE_NAME}" --format '{{.Repository}}:{{.Tag}}' \
              | grep -vE "^($KEEP_IMAGES)$" \
              | xargs -r docker rmi 2>/dev/null || true

            # Remove any leftover dangling images
            docker image prune -f 2>/dev/null || true
